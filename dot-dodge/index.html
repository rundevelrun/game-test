<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dot Dodge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="errbox" style="display:none;position:fixed;top:0;left:0;right:0;background:#ff2255;color:#fff;font-size:12px;padding:8px;z-index:9999;word-break:break-all;"></div>
  <script>
    window.onerror = function(msg, src, line) {
      var el = document.getElementById('errbox');
      el.style.display = 'block';
      el.innerText = 'ERR: ' + msg + ' (line ' + line + ')';
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/StageCompleteScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
