<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Star Assault</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>

  <!-- 모바일 에러 디버그 박스 -->
  <div id="errbox" style="display:none;position:fixed;top:0;left:0;right:0;background:#ff2255;color:#fff;padding:10px;font-size:14px;z-index:9999;word-break:break-all;max-height:40vh;overflow-y:auto;"></div>
  <script>
    window.onerror = function(m, s, l, c, err) {
      var e = document.getElementById('errbox');
      e.style.display = 'block';
      e.innerText = 'ERR: ' + m + '\n(line ' + l + ', col ' + c + ')\n' + (err ? err.stack : '');
    };
    window.addEventListener('unhandledrejection', function(event) {
      var e = document.getElementById('errbox');
      e.style.display = 'block';
      e.innerText += '\nPromise: ' + event.reason;
    });
  </script>

  <!-- Phaser 3 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- 게임 데이터 -->
  <script src="./src/data/heroes.js"></script>
  <script src="./src/data/enemies.js"></script>

  <!-- 씬 -->
  <script src="./src/scenes/MenuScene.js"></script>
  <script src="./src/scenes/GameScene.js"></script>

  <!-- 엔트리포인트 -->
  <script src="./src/main.js"></script>

</body>
</html>
